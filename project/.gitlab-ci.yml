stages:
  - build

build-docker-image:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  
  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  before_script:
    - echo "Logging into GitLab Container Registry..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY

  script:
    - echo "Building Docker image..."
    - cd project
    # Tag the image with the commit SHA and the branch name (e.g., 'feature-button-color')
    - >
      docker build 
      --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" 
      --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_URL="$NEXT_PUBLIC_CLERK_SIGN_IN_URL" 
      --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_URL="$NEXT_PUBLIC_CLERK_SIGN_UP_URL" 
      --build-arg NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL="$NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL" 
      --build-arg NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL="$NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL" 
      --build-arg NEXT_PUBLIC_PUSHER_KEY="$NEXT_PUBLIC_PUSHER_KEY" 
      --build-arg NEXT_PUBLIC_PUSHER_CLUSTER="$NEXT_PUBLIC_PUSHER_CLUSTER" 
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA 
      -t $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG .
    
    - echo "Pushing branch tags to the registry..."
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG

    # If this is the main branch, ALSO tag it as latest and push it
    - |
      if [ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]; then
        echo "Main branch detected. Tagging as latest..."
        docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE:latest
        docker push $CI_REGISTRY_IMAGE:latest
      fi